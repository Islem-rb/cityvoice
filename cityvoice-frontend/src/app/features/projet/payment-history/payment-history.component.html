<div class="history-page">

  <div class="history-container">

    <div class="history-header">
      <button class="btn-back" (click)="goBack()">
        <svg width="14" height="14" fill="none" stroke="currentColor"
             stroke-width="2.5" viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Retour
      </button>
      <div>
        <div class="history-eyebrow">Mon compte</div>
        <h1 class="history-title">Mes transactions</h1>
      </div>
    </div>

    <!-- Loading -->
    <div class="history-loading" *ngIf="loading">
      <div class="loader-ring"></div>
    </div>

    <!-- Empty -->
    <div class="history-empty" *ngIf="!loading && payments.length === 0">
      <svg width="48" height="48" fill="none" stroke="currentColor"
           stroke-width="1.5" viewBox="0 0 24 24" opacity=".3">
        <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06
                 a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78
                 1.06-1.06a5.5 5.5 0 000-7.78z"/>
      </svg>
      <p>Aucune transaction pour le moment</p>
      <button class="btn-voir" (click)="goBack()">Voir les projets</button>
    </div>

    <!-- List -->
    <div class="history-list" *ngIf="!loading && payments.length > 0">

      <div class="history-card" *ngFor="let p of payments">

        <!-- Left: method icon + title -->
        <div class="hc-left">
          <div class="hc-icon"
               [class.hc-icon-stripe]="isStripe(p)"
               [class.hc-icon-konnect]="isKonnect(p)">
            <svg *ngIf="isStripe(p)" width="18" height="18"
                 viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16
                       c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6
                       zm0-10H4V6h16v2z"/>
            </svg>
            <svg *ngIf="isKonnect(p)" width="18" height="18"
                 fill="none" stroke="currentColor" stroke-width="2"
                 viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 12h8M12 8v8"/>
            </svg>
            <svg *ngIf="!isStripe(p) && !isKonnect(p)"
                 width="18" height="18" fill="none" stroke="currentColor"
                 stroke-width="2" viewBox="0 0 24 24">
              <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
              <line x1="1" y1="10" x2="23" y2="10"/>
            </svg>
          </div>
          <div class="hc-info">
            <span class="hc-method">{{ getMethodLabel(p) }}</span>
            <span class="hc-ref">{{ p.reference || 'N/A' }}</span>
            <span class="hc-date">{{ p.date | date:'dd MMM yyyy · HH:mm' }}</span>
          </div>
        </div>

        <!-- Middle: statut -->
        <div class="hc-statut"
             [class.statut-confirme]="p.statut === 'CONFIRME'"
             [class.statut-attente]="p.statut === 'EN_ATTENTE'"
             [class.statut-echoue]="p.statut === 'ECHOUE'">
          {{ getStatutLabel(p.statut) }}
        </div>

        <!-- Right: amount + points -->
        <div class="hc-right">
          <span class="hc-montant">{{ p.montant | number:'1.0-2' }} DT</span>
          <span class="hc-points" *ngIf="p.statut === 'CONFIRME'">
            <svg width="11" height="11" fill="#F59E0B" viewBox="0 0 24 24">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02
                               12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            +{{ getPoints(p.montant) }} pts
          </span>
        </div>

      </div>
    </div>

  </div>
</div>
