server:
  port: 8082

spring:
  application:
    name: signalement-service

  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000
          ai-service:
            connect-timeout: 10000
            read-timeout: 240000

  datasource:
    url: jdbc:mysql://localhost:3306/cityvoice_signalement?useSSL=false&serverTimezone=Africa/Tunis&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Désactiver Kafka pour tester sans infrastructure
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

# URL du service IA Python (FastAPI uvicorn) — port unique 8091
# (le 8090 a été fusionné dans 8091, un seul processus api.main:app suffit)
ai:
  service:
    url: http://localhost:8091

# Timeout Feign — Spring Cloud 2023.0.x utilise spring.cloud.openfeign.*
# (l'ancien prefixe feign.client.config.* est ignoré par Spring Cloud 4.x)
# LLaVA peut prendre 1-3 minutes selon la machine.

logging:
  level:
    tn.cityvoice: DEBUG

# Configuration Système Vocal Hybride
voice:
  demo:
    enabled: true
    whisper-url: http://localhost:8000/v1/audio/transcriptions
    whisper-api-key: ""
    whisper-model: whisper-1
    whisper-language: fr
    # Ollama (local): http://localhost:11434/api/generate
    # Autres configs Twilio (optionnel)
    public-base-url: ""
    account-sid: ""
    auth-token: ""
    api-key-sid: ""
    api-key-secret: ""
    twiml-app-sid: ""
    default-identity: voice-bot
    default-latitude: 36.8065
    default-longitude: 10.1815
    default-address-label: "Localisation à confirmer"
    token-ttl-seconds: 3600
