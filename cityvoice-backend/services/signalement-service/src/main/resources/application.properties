spring.application.name=signalement-service
server.port=8082

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=localhost
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/cityvoice_signalement
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Service IA â URL par defaut (overridable via env var AI_SERVICE_URL)
ai.service.url=${AI_SERVICE_URL:http://localhost:8091}

# Feign â timeouts courts pour ne pas bloquer le thread HTTP quand l'IA est indisponible
# ── Feign (ancien prefixe, fallback) ────────────────────────────────────────
feign.client.config.default.connect-timeout=3000
feign.client.config.default.read-timeout=5000
feign.client.config.ai-service.connect-timeout=10000
feign.client.config.ai-service.read-timeout=240000
# ── Feign (Spring Cloud 2023.0.x, prefixe officiel) ─────────────────────────
# C'est CE prefixe que Spring Cloud OpenFeign 4.x lit en priorite.
spring.cloud.openfeign.client.config.default.connect-timeout=3000
spring.cloud.openfeign.client.config.default.read-timeout=5000
# ai-service : LLaVA + CNN peuvent prendre 1-3 minutes, on laisse 4 min.
spring.cloud.openfeign.client.config.ai-service.connect-timeout=10000
spring.cloud.openfeign.client.config.ai-service.read-timeout=240000
# ── WhatsApp (Green API) ───────────────────────────────────────────────────
# Instance 7107576390 — Status : Authorized
greenapi.api-url=https://7107.api.greenapi.com
greenapi.instance-id=7107576390
greenapi.api-token=581668049bc246fb901be4b7320732b8aab3c8a835484903a5
greenapi.enabled=true

# SMS — par défaut Vonage (Messages API, trial gratuit ~2€ de crédit)
# Providers disponibles : vonage | textbelt | log (mode démo console)
sms.enabled=${SMS_ENABLED:true}
sms.provider=${SMS_PROVIDER:vonage}

# TextBelt (fallback historique — désormais bloqué par Cloudflare)
sms.textbelt.url=${SMS_TEXTBELT_URL:https://textbelt.com/text}
sms.textbelt.key=${SMS_TEXTBELT_KEY:textbelt}

# Vonage (Messages API v1) — Basic Auth avec API key + secret
# Dashboard: https://dashboard.nexmo.com/
sms.vonage.url=${SMS_VONAGE_URL:https://api.nexmo.com/v1/messages}
sms.vonage.api-key=${SMS_VONAGE_API_KEY:03ed8704}
sms.vonage.api-secret=${SMS_VONAGE_API_SECRET:wMpmxuXMtjI5ah3f}
sms.vonage.from=${SMS_VONAGE_FROM:Vonage APIs}

# URL user-service (pour récupérer téléphone + préférences)
user.service.url=${USER_SERVICE_URL:http://localhost:8081}

# URL personnel-service (pour retrouver l'équipe et le chef après analyse IA)
personnel.service.url=${PERSONNEL_SERVICE_URL:http://localhost:8086}

# ── Taille max des requêtes (audio base64 peut dépasser 2MB) ─────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-post-size=52428800

# ── Demo VoIP Twilio Client / ngrok / Whisper ───────────────────────────────
voice.demo.enabled=${VOICE_DEMO_ENABLED:true}
voice.demo.public-base-url=${VOICE_PUBLIC_BASE_URL:}
voice.demo.twiml-app-sid=${TWILIO_TWIML_APP_SID:}
voice.demo.account-sid=${TWILIO_ACCOUNT_SID:}
voice.demo.api-key-sid=${TWILIO_API_KEY_SID:}
voice.demo.api-key-secret=${TWILIO_API_KEY_SECRET:}
voice.demo.auth-token=${TWILIO_AUTH_TOKEN:}
voice.demo.token-ttl-seconds=${TWILIO_TOKEN_TTL_SECONDS:3600}
voice.demo.default-identity=${VOICE_DEFAULT_IDENTITY:demo-prof}
voice.demo.default-latitude=${VOICE_DEFAULT_LATITUDE:36.8065}
voice.demo.default-longitude=${VOICE_DEFAULT_LONGITUDE:10.1815}
voice.demo.default-address-label=${VOICE_DEFAULT_ADDRESS_LABEL:Localisation a confirmer}
voice.demo.whisper-url=${VOICE_WHISPER_URL:http://localhost:9000/v1/audio/transcriptions}
voice.demo.whisper-api-key=${VOICE_WHISPER_API_KEY:}
voice.demo.whisper-model=${VOICE_WHISPER_MODEL:whisper-1}
voice.demo.whisper-language=${VOICE_WHISPER_LANGUAGE:fr}
