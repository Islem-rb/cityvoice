spring.application.name=gateway-service
server.port=8080

# ========================
# EUREKA
# ========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=localhost

# ========================
# ROUTES (ALL VIA EUREKA)
# ========================

# AUTH (user-service login)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# USER
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

# FORGOT PASSWORD & RESET PASSWORD
spring.cloud.gateway.routes[8].id=user-service-forgot
spring.cloud.gateway.routes[8].uri=lb://user-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/auth/forgot-password,/api/auth/reset-password
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/api/(?<segment>.*),/api/${segment}

# ADMIN
spring.cloud.gateway.routes[9].id=admin-route
spring.cloud.gateway.routes[9].uri=lb://user-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/admin/**

# AI API
spring.cloud.gateway.routes[10].id=ai-route
spring.cloud.gateway.routes[10].uri=lb://user-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/ai/**

# TUNISIAN MUNICIPALITY API
spring.cloud.gateway.routes[11].id=locations-route
spring.cloud.gateway.routes[11].uri=lb://user-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/locations/**

# SIGNALEMENT
spring.cloud.gateway.routes[2].id=signalement-service
spring.cloud.gateway.routes[2].uri=lb://signalement-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/signalements/**

# 3b. CONTRATS (meme service que signalement)
spring.cloud.gateway.routes[12].id=contrat-service
spring.cloud.gateway.routes[12].uri=lb://signalement-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/v1/contrats/**

# 3c. NOTIFICATIONS (meme service que signalement)
spring.cloud.gateway.routes[13].id=notification-service
spring.cloud.gateway.routes[13].uri=lb://signalement-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/api/v1/notifications/**

# 3d. HYBRID VOICE (systeme vocal — meme service que signalement)
spring.cloud.gateway.routes[14].id=hybrid-voice-service
spring.cloud.gateway.routes[14].uri=lb://signalement-service
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/v1/hybrid-voice/**

# ACTUALITE
spring.cloud.gateway.routes[3].id=actualite-service
spring.cloud.gateway.routes[3].uri=lb://actualite-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/actualites/**

# ACTUALITE-SERVICE — extra paths exposed by the actualite microservice
# (live, reactions, posts, comments, friends, groups, calls, media, chat, notifications)
spring.cloud.gateway.routes[20].id=actualite-service-extra
spring.cloud.gateway.routes[20].uri=lb://actualite-service
spring.cloud.gateway.routes[20].predicates[0]=Path=/api/live/**,/api/reactions/**,/api/posts/**,/api/comments/**,/api/friends/**,/api/groups/**,/api/calls/**,/api/media/**,/api/chat/**,/api/notifications/**

# EVENEMENT
spring.cloud.gateway.routes[4].id=evenement-service
spring.cloud.gateway.routes[4].uri=lb://evenement-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/evenements/**

# RESSOURCE
spring.cloud.gateway.routes[5].id=ressource-service
spring.cloud.gateway.routes[5].uri=lb://ressource-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/ressources/**

# PERSONNEL — le controller expose /personnel/** (pas de préfixe /api/)
# Le frontend appelle /personnel/** → on laisse passer tel quel
spring.cloud.gateway.routes[6].id=personnel-service
spring.cloud.gateway.routes[6].uri=lb://personnel-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/personnel/**

# PROJET
spring.cloud.gateway.routes[7].id=projet-service
spring.cloud.gateway.routes[7].uri=lb://projet-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/projets/**

#STRIPE(PROJET)
spring.cloud.gateway.routes[15].id=stripe-service
spring.cloud.gateway.routes[15].uri=lb://projet-service
spring.cloud.gateway.routes[15].predicates[0]=Path=/api/stripe/**

#ai projet
spring.cloud.gateway.routes[16].id=ai-projet-service
spring.cloud.gateway.routes[16].uri=lb://projet-service
spring.cloud.gateway.routes[16].predicates[0]=Path=/api/projet-ai/**
spring.cloud.gateway.routes[16].filters[0]=RewritePath=/api/projet-ai/(?<segment>.*),/api/ai/${segment}

#STATS PROJET
spring.cloud.gateway.routes[17].id=stats-service
spring.cloud.gateway.routes[17].uri=lb://projet-service
spring.cloud.gateway.routes[17].predicates[0]=Path=/api/stats/**

#PROJET KCONNECT
spring.cloud.gateway.routes[18].id=konnect-service
spring.cloud.gateway.routes[18].uri=lb://projet-service
spring.cloud.gateway.routes[18].predicates[0]=Path=/api/konnect/**

#PROJET MAIL RECEIPT
spring.cloud.gateway.routes[19].id=receipts-route
spring.cloud.gateway.routes[19].uri=lb://projet-service
spring.cloud.gateway.routes[19].predicates[0]=Path=/api/receipts/**

# ========================
# GLOBAL CORS CONFIG
# ========================
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].exposedHeaders=Authorization
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true


# ========================
# ACTUATOR & LOGGING
# ========================
management.endpoints.web.exposure.include=*
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.netflix.eureka=DEBUG
logging.level.com.netflix.discovery=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# ========================
# CONFIGURATION DIVERS
# ========================
spring.codec.max-in-memory-size=20MB