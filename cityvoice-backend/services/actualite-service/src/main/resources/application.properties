spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
app.upload.dir=uploads/posts

# ===== Multipart upload limits =====
# Default Spring Boot limit is 1MB per file / 10MB per request, which is way too low for
# videos and even most modern phone photos. This is the cause of "Serveur injoignable"
# (status 0) on local file upload while AI image (URL only) works.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

